<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComicView - Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1f; --surface: #25252b; --border: #3a3a44;
    --text: #e0e0e0; --text-muted: #888; --accent: #6c8cff;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    background: var(--surface); padding: 40px 32px;
    border-radius: 12px; width: 360px; max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .login-box h1 {
    text-align: center; font-size: 1.6rem; margin-bottom: 28px;
    font-weight: 600;
  }
  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: .85rem; color: var(--text-muted); margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 10px 12px; font-size: .95rem;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; padding: 10px; margin-top: 8px;
    font-size: 1rem; font-weight: 500;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius); cursor: pointer;
    transition: opacity .2s;
  }
  .btn-login:hover { opacity: .85; }
  .error-msg {
    color: #e06060; font-size: .85rem; text-align: center;
    margin-bottom: 12px; min-height: 20px;
  }
</style>
</head>
<body>
<div class="login-box">
  <h1>ComicView</h1>
  <form method="post" action="/login">
    <div class="error-msg">{{ error or '' }}</div>
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn-login" type="submit">Login</button>
  </form>
</div>
</body>
</html>
